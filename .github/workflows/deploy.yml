name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 가져오기
      - uses: actions/checkout@v4

      # 2. Docker Hub 로그인
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. 이미지 빌드 & Docker Hub에 push
      - run: |
          docker build -t wannywanny/infra-practice:latest .
          docker push wannywanny/infra-practice:latest

      # 4. EC2에 SSH 접속 → pull → 재시작
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull wannywanny/infra-practice:latest
            sudo docker stop infra-app || true
            sudo docker rm infra-app || true
            sudo docker run -d --name infra-app -p 8000:8000 wannywanny/infra-practice:latest
